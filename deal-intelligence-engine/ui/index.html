<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Room</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #111317;
  --surface: #1a1d23;
  --border:  #2a2d35;
  --text:    #e2e4e9;
  --muted:   #6b7280;
  --accent:  #3b82f6;
  --green:   #22c55e;
  --yellow:  #eab308;
  --red:     #ef4444;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  height: 52px;
}

.topbar-logo {
  font-weight: 700;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}

.deal-select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 14px;
  cursor: pointer;
  outline: none;
  min-width: 180px;
}

.deal-select:focus { border-color: var(--accent); }

.badge {
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.badge-blue  { background:#1e3a5f; color:#60a5fa; border:1px solid #2563eb44; }
.badge-green { background:#14291a; color:var(--green); border:1px solid #16a34a44; }
.badge-yellow{ background:#2a2200; color:var(--yellow); border:1px solid #a1620044; }
.badge-red   { background:#2a0a0a; color:var(--red); border:1px solid #dc262644; }

.topbar-meta {
  margin-left: auto;
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
}

/* ── MAIN LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── LEFT PANEL ── */
.left {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  flex-shrink: 0;
}

.panel-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.radar-wrap { display:flex; justify-content:center; }

/* Score bars */
.score-grid { display:flex; flex-direction:column; gap:5px; }
.score-row { display:flex; align-items:center; gap:6px; }
.score-label { width:28px; font-size:11px; color:var(--muted); font-weight:600; }
.score-bar-wrap { flex:1; background:var(--bg); border-radius:3px; height:7px; overflow:hidden; }
.score-bar { height:100%; border-radius:3px; transition:width 0.5s ease; }
.score-val { width:18px; text-align:right; font-size:11px; font-weight:700; }
.score-flag { font-size:11px; color:var(--red); }

/* Stakeholder cards */
.stakeholder-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 10px;
  margin-bottom: 5px;
}
.stakeholder-name { font-weight:600; font-size:12px; }
.stakeholder-role {
  display:inline-block;
  font-size:10px;
  font-weight:700;
  color:var(--accent);
  margin-top:2px;
  background:#1e3a5f44;
  border-radius:4px;
  padding:1px 5px;
}
.stakeholder-email { font-size:10px; color:var(--muted); margin-top:3px; word-break:break-all; }

/* Trend sparkline */
.trend-wrap {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:7px;
  padding:10px 12px;
}
.trend-svg { width:100%; height:38px; }
.trend-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:3px; }

/* Next step */
.next-step-box {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:7px;
  padding:10px 12px;
  font-size:12px;
  line-height:1.5;
  color:var(--text);
}
.next-step-date { font-size:11px; color:var(--accent); margin-top:3px; }

/* ── CENTER PANEL (CHAT) ── */
.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg { display:flex; gap:8px; max-width:90%; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }

.msg-avatar {
  width:26px; height:26px;
  border-radius:50%;
  background:var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
  flex-shrink:0;
}
.msg.user .msg-avatar { background:var(--accent); font-size:10px; font-weight:700; color:white; }

.msg-bubble {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:9px 13px;
  line-height:1.6;
  font-size:13.5px;
  white-space:pre-wrap;
  word-break:break-word;
}
.msg.user .msg-bubble { background:#1e3a5f; border-color:#2563eb44; }

.msg-time { font-size:10px; color:var(--muted); margin-top:3px; }

.draft-tag {
  display:inline-block;
  background:#1a2e1a;
  border:1px solid #16a34a55;
  color:var(--green);
  border-radius:5px;
  padding:2px 7px;
  font-size:11px;
  font-weight:700;
  margin-top:5px;
  cursor:pointer;
}

.typing { color:var(--muted); font-size:13px; font-style:italic; align-self:flex-start; padding:4px 0 4px 34px; }

.chat-input-wrap {
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  gap:8px;
  align-items:flex-end;
  background:var(--surface);
  flex-shrink:0;
}

.chat-input {
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  padding:9px 13px;
  font-size:14px;
  font-family:inherit;
  resize:none;
  outline:none;
  line-height:1.5;
  min-height:40px;
  max-height:120px;
}
.chat-input:focus { border-color:var(--accent); }

.btn-send {
  background:var(--accent);
  color:white;
  border:none;
  border-radius:8px;
  padding:9px 16px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  flex-shrink:0;
}
.btn-send:hover { background:#2563eb; }
.btn-send:disabled { opacity:0.4; cursor:default; }

/* ── RESIZER ── */
.resizer {
  width: 5px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
}
.resizer:hover, .resizer.active { background: var(--accent); }

/* ── RIGHT PANEL (DRAFT) ── */
.right {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  width: 380px;
  min-width: 260px;
  max-width: 640px;
}

.right-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

.right-title { font-size:13px; font-weight:700; }
.right-meta  { font-size:11px; color:var(--muted); margin-top:2px; }

.draft-body {
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.draft-field label {
  display:block;
  font-size:10px;
  font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:4px;
}

.draft-field input,
.draft-field textarea {
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  padding:8px 11px;
  font-size:13px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  outline:none;
  resize:vertical;
  line-height:1.6;
}
.draft-field input:focus,
.draft-field textarea:focus { border-color:var(--accent); }
.draft-field textarea { min-height:260px; }

.draft-actions {
  padding:10px 14px;
  border-top:1px solid var(--border);
  display:flex;
  gap:7px;
  flex-shrink:0;
}

.btn-approve {
  flex:1;
  background:var(--green);
  color:#050f05;
  border:none;
  border-radius:7px;
  padding:9px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}
.btn-approve:hover { background:#16a34a; color:white; }
.btn-approve:disabled { opacity:0.4; cursor:default; }

.btn-discard {
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:7px;
  padding:9px 14px;
  font-size:13px;
  cursor:pointer;
}
.btn-discard:hover { border-color:var(--red); color:var(--red); }

.empty-draft {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
  color:var(--muted);
  padding:24px;
}
.empty-draft-icon { font-size:28px; opacity:0.25; }
.empty-draft-text { font-size:12px; text-align:center; line-height:1.6; }

/* Toast */
.toast {
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#14291a;
  border:1px solid var(--green);
  color:var(--green);
  border-radius:8px;
  padding:10px 20px;
  font-size:13px;
  font-weight:600;
  transition:transform 0.25s ease;
  z-index:999;
  pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Loading state */
.loading { opacity:0.5; pointer-events:none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo">Deal Room</span>
  <select class="deal-select" id="dealSelect" onchange="selectDeal(this.value)">
    <option value="">Loading deals…</option>
  </select>
  <span class="badge badge-blue" id="casBadge" style="display:none"></span>
  <span class="badge" id="scoreBadge" style="display:none"></span>
  <span class="topbar-meta" id="topbarMeta"></span>
</div>

<!-- MAIN -->
<div class="main" id="mainLayout">

  <!-- LEFT -->
  <div class="left" id="leftPanel">
    <div style="color:var(--muted);font-size:12px;text-align:center;margin-top:40px">Select a deal to begin</div>
  </div>

  <!-- CENTER: CHAT -->
  <div class="center">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Ask about this deal, request a draft, or check the pipeline…" rows="1"
        onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <!-- RESIZER -->
  <div class="resizer" id="resizer"></div>

  <!-- RIGHT: DRAFT -->
  <div class="right" id="rightPanel">
    <div class="right-header">
      <div>
        <div class="right-title">Draft Editor</div>
        <div class="right-meta" id="draftMeta">No draft loaded</div>
      </div>
    </div>
    <div class="empty-draft" id="emptyDraft">
      <div class="empty-draft-icon">✏️</div>
      <div class="empty-draft-text">Drafts generated in chat<br>will appear here for editing</div>
    </div>
    <div class="draft-body" id="draftBody" style="display:none">
      <div class="draft-field">
        <label>Subject</label>
        <input type="text" id="draftSubject" placeholder="Subject line">
      </div>
      <div class="draft-field">
        <label>Body</label>
        <textarea id="draftBodyText" placeholder="Draft body text…"></textarea>
      </div>
    </div>
    <div class="draft-actions" id="draftActions" style="display:none">
      <button class="btn-approve" id="approveBtn" onclick="approveDraft()">✓ Approve &amp; Copy</button>
      <button class="btn-discard" onclick="discardDraft()">Discard</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const N8N = 'http://localhost:5678';
const CHAT_WEBHOOK = `${N8N}/webhook/cw04a-0001-0000-0000-000000000001/chat`;
const GET_DEALS    = `${N8N}/webhook/get-deals`;
const GET_CONTEXT  = `${N8N}/webhook/get-deal-context`;
const APPROVE_URL  = `${N8N}/webhook/output-approve`;

// ── State ────────────────────────────────────────────────────────────
let currentDealId   = null;
let currentSessionId = null;
let currentDraftId  = null;
let isLoading       = false;

// ── Init ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadDeals();
  setupResizer();
  document.getElementById('chatInput').addEventListener('input', autoResize);
});

// ── Load deal list ────────────────────────────────────────────────────
async function loadDeals() {
  try {
    const res = await fetch(GET_DEALS);
    const data = await res.json();
    const deals = data.deals || [];
    const sel = document.getElementById('dealSelect');
    sel.innerHTML = `<option value="">— Select a deal —</option>` +
      deals.map(d => `<option value="${d.deal_id}">${d.company_name} (${capitalize(d.deal_stage)})</option>`).join('');
  } catch(e) {
    document.getElementById('dealSelect').innerHTML = `<option value="">Error loading deals</option>`;
    console.error('Failed to load deals:', e);
  }
}

// ── Select deal ───────────────────────────────────────────────────────
async function selectDeal(dealId) {
  if (!dealId) return;
  currentDealId = dealId;
  currentSessionId = `deal_room_${dealId}_${Date.now()}`;
  currentDraftId = null;
  clearDraft();
  clearChat();

  // Show loading state
  document.getElementById('leftPanel').innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;margin-top:40px">Loading…</div>`;
  document.getElementById('casBadge').style.display = 'none';
  document.getElementById('scoreBadge').style.display = 'none';
  document.getElementById('topbarMeta').textContent = '';

  try {
    const res = await fetch(`${GET_CONTEXT}?deal_id=${encodeURIComponent(dealId)}`);
    const ctx = await res.json();
    renderLeftPanel(ctx);
    renderTopBar(ctx);
    document.getElementById('sendBtn').disabled = false;

    // Auto-open with pending drafts check
    appendAgentMessage('📋 Checking for pending drafts and pipeline status…');
    await sendToChat('📋 Show pending drafts');
  } catch(e) {
    document.getElementById('leftPanel').innerHTML = `<div style="color:var(--red);font-size:12px;padding:16px">Failed to load deal context</div>`;
    console.error(e);
  }
}

// ── Render top bar ────────────────────────────────────────────────────
function renderTopBar(ctx) {
  const score = ctx.scores?.total ?? 0;
  const trend = ctx.trend_direction || 'stable';
  const delta = ctx.score_vs_previous ?? 0;
  const arrow = trend === 'improving' ? '↑' : trend === 'declining' ? '↓' : '→';
  const scoreClass = score >= 20 ? 'badge-green' : score >= 12 ? 'badge-yellow' : 'badge-red';
  const scoredAt = ctx.scored_at ? timeAgo(ctx.scored_at) : '';

  const cas = document.getElementById('casBadge');
  cas.textContent = ctx.cas || '';
  cas.style.display = ctx.cas ? '' : 'none';

  const sb = document.getElementById('scoreBadge');
  sb.textContent = `${score} / 30 ${arrow}${Math.abs(delta) > 0 ? delta : ''}`;
  sb.className = `badge ${scoreClass}`;
  sb.style.display = '';

  document.getElementById('topbarMeta').textContent =
    `${capitalize(ctx.deal_stage || '')} stage${scoredAt ? ' · Scored ' + scoredAt : ''}`;
}

// ── Render left panel ─────────────────────────────────────────────────
function renderLeftPanel(ctx) {
  const scores = ctx.scores || {};
  const dims = [
    { key:'pain',   label:'Pain'  },
    { key:'power',  label:'Power' },
    { key:'vision', label:'Vis'   },
    { key:'value',  label:'Val'   },
    { key:'change', label:'Chg'   },
    { key:'control',label:'Ctrl'  },
  ];

  // Score bars HTML
  const barsHtml = dims.map(d => {
    const v = scores[d.key] ?? 0;
    const pct = (v / 5) * 100;
    const col = v >= 4 ? 'var(--green)' : v >= 3 ? 'var(--yellow)' : 'var(--red)';
    const flag = v <= 2 ? '<span class="score-flag">⚠</span>' : '';
    return `<div class="score-row">
      <span class="score-label">${d.label}</span>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${col}"></div></div>
      <span class="score-val" style="color:${col}">${v}</span>${flag}
    </div>`;
  }).join('');

  // Radar SVG
  const radarSvg = buildRadar(scores);

  // Stakeholders
  const stakeHtml = (ctx.stakeholders || []).map(s => `
    <div class="stakeholder-card">
      <div class="stakeholder-name">${esc(s.name || '')}</div>
      <div class="stakeholder-role">${esc(s.cps_role || '')}</div>
      <div class="stakeholder-email">${esc(s.email || s.title || '')}</div>
    </div>`).join('') || '<div style="color:var(--muted);font-size:12px">No stakeholders yet</div>';

  // Sparkline
  const sparkHtml = buildSparkline(ctx.score_history || []);

  // Next step
  const nsHtml = ctx.next_step ? `
    <div class="next-step-box">
      ${esc(ctx.next_step)}
      ${ctx.next_step_date ? `<div class="next-step-date">By ${formatDate(ctx.next_step_date)}</div>` : ''}
    </div>` : '';

  document.getElementById('leftPanel').innerHTML = `
    <div>
      <div class="panel-title">P2V2C2 Radar</div>
      <div class="radar-wrap">${radarSvg}</div>
    </div>
    <div>
      <div class="panel-title">Dimension Scores</div>
      <div class="score-grid">${barsHtml}</div>
    </div>
    <div>
      <div class="panel-title">Stakeholders</div>
      ${stakeHtml}
    </div>
    ${(ctx.score_history || []).length > 1 ? `<div><div class="panel-title">Score Trend</div>${sparkHtml}</div>` : ''}
    ${nsHtml ? `<div><div class="panel-title">Next Step</div>${nsHtml}</div>` : ''}
  `;
}

// ── Radar chart ───────────────────────────────────────────────────────
function buildRadar(scores) {
  const W = 180, H = 158;
  const cx = 90, cy = 79;
  const maxR = 58;
  const dims = ['pain','power','vision','value','change','control'];
  const labels = ['Pain','Power','Vision','Value','Change','Control'];
  const angles = dims.map((_, i) => (Math.PI * 2 * i / dims.length) - Math.PI / 2);

  const ringPath = (r) => {
    const pts = angles.map(a => `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
    return `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  };

  const axisLines = angles.map(a =>
    `<line x1="${cx}" y1="${cy}" x2="${cx + maxR*Math.cos(a)}" y2="${cy + maxR*Math.sin(a)}" stroke="var(--border)" stroke-width="1"/>`
  ).join('');

  const dataPoints = dims.map((d, i) => {
    const v = scores[d] ?? 0;
    const r = (v / 5) * maxR;
    return `${cx + r * Math.cos(angles[i])},${cy + r * Math.sin(angles[i])}`;
  });

  const labelEls = labels.map((l, i) => {
    const r = maxR + 14;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    const anchor = Math.cos(angles[i]) > 0.1 ? 'start' : Math.cos(angles[i]) < -0.1 ? 'end' : 'middle';
    return `<text x="${x}" y="${y+3}" text-anchor="${anchor}" fill="var(--muted)" font-size="9">${l}</text>`;
  }).join('');

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    ${ringPath(maxR * 1)}${ringPath(maxR * 0.6)}${ringPath(maxR * 0.2)}
    ${axisLines}
    <polygon points="${dataPoints.join(' ')}" fill="var(--accent)" fill-opacity="0.15" stroke="var(--accent)" stroke-width="2"/>
    ${dataPoints.map(p => `<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="3" fill="var(--accent)"/>`).join('')}
    ${labelEls}
  </svg>`;
}

// ── Sparkline ─────────────────────────────────────────────────────────
function buildSparkline(history) {
  if (!history.length) return '';
  const vals = history.map(h => Number(h.p2v2c2_total) || 0);
  const max = Math.max(...vals, 1);
  const W = 192, H = 40;
  const pts = vals.map((v, i) => {
    const x = vals.length === 1 ? W/2 : (i / (vals.length - 1)) * W;
    const y = H - (v / max) * (H - 4) - 2;
    return `${x},${y}`;
  }).join(' ');

  const dates = history.map(h => {
    const d = new Date(h.score_date);
    return `${d.getMonth()+1}/${d.getDate()}`;
  });

  const firstDate = dates[0] || '';
  const lastDate  = dates[dates.length - 1] || '';

  return `<div class="trend-wrap">
    <svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      ${vals.map((v, i) => {
        const x = vals.length === 1 ? W/2 : (i / (vals.length - 1)) * W;
        const y = H - (v / max) * (H - 4) - 2;
        const col = i === vals.length - 1 ? 'var(--green)' : 'var(--accent)';
        return `<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`;
      }).join('')}
    </svg>
    <div class="trend-labels"><span>${firstDate}</span><span>${lastDate}</span></div>
  </div>`;
}

// ── Chat ──────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = '';
  appendUserMessage(text);
  await sendToChat(text);
}

async function sendToChat(text) {
  if (!currentSessionId) return;
  setLoading(true);

  try {
    const res = await fetch(CHAT_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'sendMessage',
        sessionId: currentSessionId,
        chatInput: text
      })
    });
    const data = await res.json();
    const output = data.output || data.text || data.message || JSON.stringify(data);
    appendAgentMessage(output);
    tryExtractDraft(output, data);
  } catch(e) {
    appendAgentMessage('Error: Could not reach n8n. Check that the chat workflow is active.');
    console.error(e);
  } finally {
    setLoading(false);
  }
}

function appendUserMessage(text) {
  const msgs = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-avatar">AH</div><div><div class="msg-bubble">${esc(text)}</div><div class="msg-time">${nowTime()}</div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendAgentMessage(text) {
  const msgs = document.getElementById('chatMessages');
  // Remove typing indicator if present
  const typing = msgs.querySelector('.typing');
  if (typing) typing.remove();

  const el = document.createElement('div');
  el.className = 'msg';

  // Detect if text contains a draft marker
  const hasDraft = /draft\s*(id|#)\s*:?\s*(\d+)/i.test(text) || /draft_id\s*:\s*(\d+)/i.test(text);
  const draftTag = hasDraft
    ? `<div class="draft-tag" onclick="scrollToDraft()">✦ Draft loaded in editor →</div>`
    : '';

  el.innerHTML = `<div class="msg-avatar">🤖</div><div><div class="msg-bubble">${formatMessage(text)}${draftTag}</div><div class="msg-time">${nowTime()}</div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'typing';
  el.textContent = 'Thinking…';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function clearChat() {
  document.getElementById('chatMessages').innerHTML = '';
}

// ── Draft extraction ──────────────────────────────────────────────────
function tryExtractDraft(text, data) {
  // Try structured response first (if CW-04e returns draft fields)
  if (data.draft_id && (data.subject || data.body)) {
    loadDraft(data.draft_id, data.subject || '', data.body || '', data.recipient_name || '', data.output_type || '');
    return;
  }

  // Parse from agent text
  // Pattern: "Draft ID: 123" or "Draft #123" then "Subject: ..." then body
  const idMatch = text.match(/draft\s*(?:id|#)\s*:?\s*(\d+)/i);
  const subjectMatch = text.match(/\*?\*?subject\*?\*?\s*:[ \t]*(.+)/i);

  if (idMatch) {
    const draftId = idMatch[1];
    const subject = subjectMatch ? subjectMatch[1].trim().replace(/\*+/g,'') : '';

    // Extract body — everything after "Subject: ..." up to end or a separator
    let body = '';
    const subjectIdx = subjectMatch ? text.indexOf(subjectMatch[0]) : -1;
    if (subjectIdx !== -1) {
      const afterSubject = text.slice(subjectIdx + subjectMatch[0].length).trim();
      // Strip leading newline and any "Body:" prefix
      body = afterSubject.replace(/^\*?\*?body\*?\*?\s*:\s*/i, '').trim();
    }

    if (subject || body) {
      loadDraft(draftId, subject, body, '', '');
    }
  }
}

function loadDraft(draftId, subject, body, recipientName, outputType) {
  currentDraftId = draftId;
  document.getElementById('draftSubject').value = subject;
  document.getElementById('draftBodyText').value = body;
  document.getElementById('draftMeta').textContent =
    `Draft #${draftId}${outputType ? ' · ' + outputType.replace(/_/g,' ') : ''}${recipientName ? ' · To: ' + recipientName : ''}`;
  document.getElementById('emptyDraft').style.display = 'none';
  document.getElementById('draftBody').style.display = 'flex';
  document.getElementById('draftActions').style.display = 'flex';
}

function clearDraft() {
  currentDraftId = null;
  document.getElementById('draftSubject').value = '';
  document.getElementById('draftBodyText').value = '';
  document.getElementById('draftMeta').textContent = 'No draft loaded';
  document.getElementById('emptyDraft').style.display = 'flex';
  document.getElementById('draftBody').style.display = 'none';
  document.getElementById('draftActions').style.display = 'none';
}

function scrollToDraft() {
  document.getElementById('draftBodyText').focus();
}

// ── Approve & Copy ────────────────────────────────────────────────────
async function approveDraft() {
  if (!currentDraftId) return;
  const subject = document.getElementById('draftSubject').value.trim();
  const body = document.getElementById('draftBodyText').value.trim();
  const finalBody = `Subject: ${subject}\n\n${body}`;

  document.getElementById('approveBtn').disabled = true;

  try {
    const res = await fetch(APPROVE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ draft_id: currentDraftId, final_body: body })
    });

    // Copy clean plain text to clipboard
    await navigator.clipboard.writeText(body);
    showToast('✓ Approved & copied to clipboard');
    appendAgentMessage(`Draft #${currentDraftId} approved. Copied to clipboard — paste into Outlook or Teams.`);
    clearDraft();
  } catch(e) {
    // Still copy even if approve webhook fails
    try {
      await navigator.clipboard.writeText(body);
      showToast('Copied to clipboard (approve webhook unreachable)');
    } catch(ce) {
      showToast('Approve failed — check n8n');
    }
    console.error(e);
  } finally {
    const btn = document.getElementById('approveBtn');
    if (btn) btn.disabled = false;
  }
}

function discardDraft() {
  clearDraft();
}

// ── Resizer ───────────────────────────────────────────────────────────
function setupResizer() {
  const resizer = document.getElementById('resizer');
  const right   = document.getElementById('rightPanel');
  let isResizing = false, startX = 0, startWidth = 0;

  resizer.addEventListener('mousedown', e => {
    isResizing = true;
    startX = e.clientX;
    startWidth = right.offsetWidth;
    resizer.classList.add('active');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });

  document.addEventListener('mousemove', e => {
    if (!isResizing) return;
    const delta = startX - e.clientX;
    const newWidth = Math.min(640, Math.max(260, startWidth + delta));
    right.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    resizer.classList.remove('active');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}

// ── Helpers ───────────────────────────────────────────────────────────
function setLoading(v) {
  isLoading = v;
  const btn = document.getElementById('sendBtn');
  btn.disabled = v || !currentDealId;
  if (v) showTyping();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function autoResize() {
  const el = document.getElementById('chatInput');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatMessage(text) {
  // Bold **text**, italic *text*, links, newlines
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function nowTime() {
  return new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function timeAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}
